<body>
<div class="nav-container"></div>

<div class="content">
    <section class="about-section">

        <div class="about-title">
            <h1>關於 おみやびより</h1>
            <p>把日本旅行中的美味回憶，溫柔送到你的日常生活裡。</p>
        </div>

        <div class="about-visual">
            <img src="images/about.jpg" alt="日本伴手禮">
        </div>

        <div class="about-card">
            <h2>🍡 我們的理念</h2>
            <p>
                おみやびより是一間以日本各地人氣伴手禮為主題的訂購網站。
                透過每一份精選名產，讓顧客不用出國，也能感受到日本旅行中的幸福滋味。
            </p>

            <h2>🗾 精選日本名產</h2>
            <p>
                從東京香蕉、京都宇治抹茶粉，到福岡明太子抹醬、北海道白色戀人與沖繩雪鹽餅乾，
                每一項商品都代表著不同地區的特色文化與風味。
            </p>

            <h2>💖 用心服務</h2>
            <p>
                我們重視安心、便利與溫暖的購物體驗，希望讓每一次訂購，
                都像收到一份來自日本的小小禮物。
            </p>
        </div>

        <div class="about-message">
            <h2>品牌願景 ✨</h2>
            <p>
                成為連結台灣與日本美食文化的橋樑，將更多值得分享的日本伴手禮介紹給大家。
            </p>
        </div>

    </section>
</div>
