<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>產品介紹</title>
	<link rel="stylesheet" href="style.css">	
</head>

<body>
	<div class="nav-container"></div>

    <!-- Main -->
<div class="content">
  <section class="card-container">

    <div class="card">
      <img src="images/Japanese_gift_banana.jpg" alt="東京香蕉">
      <h3>東京香蕉</h3>
      <p>東京人氣伴手禮，香甜香蕉內餡令人回味無窮。</p>
    </div>

    <div class="card">
      <img src="images/macha-kyoto.jpg" alt="京都宇治抹茶粉">
      <h3>京都宇治抹茶粉</h3>
      <p>濃郁茶香與細緻口感，感受京都傳統風味。</p>
    </div>

    <div class="card">
      <img src="images/menntaiko-mayonezu.jpg" alt="福岡明太子抹醬">
      <h3>福岡明太子抹醬</h3>
      <p>鹹香微辣，輕鬆為料理增添日式風味。</p>
    </div>

    <div class="card">
      <img src="images/shiroikoibito.jpg" alt="北海道白色戀人">
      <h3>北海道白色戀人</h3>
      <p>酥脆餅乾與白巧克力的經典組合。</p>
    </div>

    <div class="card">
      <img src="images/chinsuko.jpg" alt="沖繩雪鹽餅乾">
      <h3>沖繩雪鹽餅乾</h3>
      <p>鹹甜平衡，品嚐來自沖繩海風的滋味。</p>
    </div>

  </section>
</div>
<div class="footer"></div>

<script src="main.js"></script>

</body>
</html>
